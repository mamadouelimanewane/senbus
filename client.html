<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunuBus - Voyageur</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./src/client.css" />
</head>
<body>
    <div id="app">
        <!-- Moteur de vue -->
        <main id="view-carte" class="view active">
             <div id="map"></div>
             <div class="map-filters">
                 <div class="filter-group">
                     <button class="active">Tous</button>
                     <button>DDD</button>
                     <button>TATA</button>
                 </div>
                 <div class="pill-info">🛰️ 100 lignes — tracés LocationIQ</div>
             </div>
             
             <div class="map-bottom-controls">
                 <button class="btn-itineraire" onclick="window.switchView('trajet')">Itinéraire</button>
                 <button class="btn-destination" onclick="window.switchView('trajet')">Où allez-vous ?</button>
             </div>
        </main>
        
        <main id="view-trajet" class="view">
             <div class="view-header route-header">Dakar Dem Dikk – Itinéraire</div>
             <div class="padding-wrapper">
                 <div class="trajet-card">
                     <div class="trajet-field">
                         <div class="dot dot-green"></div>
                         <input type="text" id="input-depart" placeholder="D'où partez-vous ?" value="Position actuelle" />
                         <button class="map-btn">🗺️</button>
                     </div>
                     <div class="trajet-field border-top">
                         <div class="dot dot-red"></div>
                         <input type="text" id="input-dest" placeholder="Où allez-vous ?" />
                         <button class="map-btn">🗺️</button>
                     </div>
                     <button class="btn-rechercher" id="btn-search-route">🚀 Rechercher un trajet</button>
                 </div>
                 
                 <div id="route-result" style="display:none; margin-top:20px;">
                    <h3 style="margin-bottom:10px; font-weight:700;">Itinéraire suggéré</h3>
                    <div class="route-suggestion-card">
                        <div class="route-time-info">
                           <span class="route-duration">45 min</span>
                           <span class="route-arrival">Arrivée 14:30</span>
                        </div>
                        <div class="route-steps">
                            <div class="route-step">🚶 5 min vers l'arrêt <b>Indépendance</b></div>
                            <div class="route-step">🚌 Ligne <b>4</b> (Dir. Liberté 5)</div>
                            <div class="route-step">🚶 2 min vers la destination</div>
                        </div>
                        <button class="btn-start-nav" onclick="window.startNav()">Démarrer la navigation</button>
                    </div>
                 </div>
             </div>
        </main>
        
        <main id="view-lignes" class="view">
             <div class="padding-wrapper">
                 <h2 class="page-title">Réseau de Transport</h2>
                 <p class="page-subtitle">Lignes actives à Dakar</p>
                 <button class="btn-see-map" onclick="window.switchView('carte')">🗺️ Voir tout le réseau sur carte</button>
                 <div class="filter-group-alt">
                     <button class="active">Toutes</button>
                     <button>DDD</button>
                     <button>TATA</button>
                 </div>
                 <div class="lines-list" id="lines-list">
                     <!-- Generated by TS -->
                 </div>
             </div>
        </main>

        <main id="view-chercher" class="view">
             <div class="padding-wrapper">
                 <h2 class="search-title">Explorer le réseau</h2>
                 <div class="search-bar">
                     <input type="text" placeholder="Ligne, arrêt, quartier..." id="search-input"/>
                 </div>
                 <div class="lines-list search-results" id="search-results">
                     <!-- Generated by TS -->
                 </div>
             </div>
        </main>
        
        <!-- Bottom Nav -->
        <nav class="bottom-nav">
             <div class="nav-item active" data-target="carte" onclick="window.switchView('carte')">
                 <div class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4.03L15 22l8-4V2l-8 4-7-4-7 4z"></path></svg>
                 </div>
                 <span>Carte</span>
             </div>
             <div class="nav-item" data-target="trajet" onclick="window.switchView('trajet')">
                 <div class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22l10-3 10 3L12 2z"></path></svg>
                 </div>
                 <span>Trajet</span>
             </div>
             <div class="nav-item" data-target="lignes" onclick="window.switchView('lignes')">
                 <div class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line></svg>
                 </div>
                 <span>Lignes</span>
             </div>
             <div class="nav-item" data-target="chercher" onclick="window.switchView('chercher')">
                 <div class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                 </div>
                 <span>Chercher</span>
             </div>
             <div class="nav-item">
                 <div class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                 </div>
                 <span>Profil</span>
             </div>
        </nav>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./src/client.ts"></script>
</body>
</html>
