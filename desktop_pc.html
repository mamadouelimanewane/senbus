<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poste de Commandement - Dakar Dem Dikk</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --pc-bg: #0a0b10;
            --pc-surface: #151720;
            --pc-border: #252a3a;
            --pc-primary: #004a99;
            --pc-accent: #00f2ff;
            --pc-text: #e0e6ed;
            --pc-text-dim: #8492a6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--pc-bg); 
            color: var(--pc-text);
            overflow: hidden;
            height: 100vh;
        }

        .pc-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .pc-header {
            height: 80px;
            background: var(--pc-surface);
            border-bottom: 2px solid var(--pc-primary);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 40px;
            z-index: 100;
        }

        .pc-brand { display: flex; align-items: center; gap: 15px; }
        .pc-logo { font-size: 32px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.4)); }
        .pc-title h1 { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .pc-title p { font-size: 10px; font-weight: 600; color: var(--pc-accent); opacity: 0.8; }

        .pc-stats-row { flex: 1; display: flex; gap: 40px; justify-content: flex-end; padding-right: 40px; }
        .pc-stat-item { display: flex; flex-direction: column; align-items: flex-end; }
        .pc-stat-item .label { font-size: 9px; font-weight: 800; color: var(--pc-text-dim); text-transform: uppercase; }
        .pc-stat-item .value { font-size: 20px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono', monospace; }

        .pc-control-group { 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 12px;
            border: 1px solid var(--pc-border);
        }
        .pc-control-group .label { font-size: 9px; font-weight: 800; color: var(--pc-accent); }
        .pc-control-group .value { font-size: 14px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono', monospace; }
        
        input[type=range] {
            -webkit-appearance: none; width: 120px; height: 4px; background: var(--pc-border); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; background: var(--pc-accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,242,255,0.5);
        }

        .pc-clock { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--pc-accent); min-width: 120px; text-align: right; }

        .pc-main { display: flex; flex: 1; min-height: 0; }

        .pc-sidebar {
            width: 320px;
            background: var(--pc-surface);
            border-right: 1px solid var(--pc-border);
            display: flex;
            flex-direction: column;
        }
        .pc-sidebar-header { padding: 25px; border-bottom: 1px solid var(--pc-border); }
        .pc-sidebar-header h2 { font-size: 16px; margin-bottom: 15px; }
        .pc-search {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--pc-border);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            outline: none;
        }

        .pc-line-list { flex: 1; overflow-y: auto; padding: 10px; }
        .pc-line-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
        }
        .pc-line-item:hover { background: rgba(255,255,255,0.05); }
        .line-badge { 
            width: 40px; height: 28px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 12px; color: #fff;
        }
        .line-info { display: flex; flex-direction: column; }
        .line-name { font-size: 13px; font-weight: 600; }
        .line-status { font-size: 9px; font-weight: 700; color: #00e676; margin-top: 2px; }

        .pc-map-wrapper { flex: 1; position: relative; }
        #pc-map { position: absolute; inset: 0; background: #000; }

        .pc-event-log {
            width: 280px;
            background: var(--pc-surface);
            border-left: 1px solid var(--pc-border);
            display: flex;
            flex-direction: column;
        }
        .log-header { padding: 20px; font-size: 12px; font-weight: 800; border-bottom: 1px solid var(--pc-border); color: var(--pc-accent); }
        .log-entries { flex: 1; overflow-y: auto; padding: 15px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--pc-text-dim); }
        .log-entry { margin-bottom: 10px; line-height: 1.4; }
        .log-entry.highlight { color: #fff; border-left: 2px solid var(--pc-accent); padding-left: 8px; }

        /* Custom Marker */
        .pc-bus-icon { }
        .bus-dot {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="pc-root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/src/desktop_pc.ts"></script>
</body>
</html>
